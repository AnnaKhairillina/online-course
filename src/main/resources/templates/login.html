<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="page center">
    <div class="card small">
        <h2>Личный кабинет</h2>
        <form th:action="@{/login}" method="post" class="form">
            <label>Email
                <input type="email" name="email" required placeholder="you@example.com">
            </label>
            <label>Пароль
                <input type="password" name="password" required>
            </label>
            <button type="submit">Войти</button>
        </form>

        <p class="hint" th:if="${param.error}">Неверный логин или пароль</p>
        <p class="ok" th:if="${param.registered}">Регистрация успешна. Войдите в систему.</p>
        <p class="ok" th:if="${param.logout}">Вы вышли из системы.</p>

        <a th:href="@{/register}" class="link-btn">Регистрация студента</a>
    </div>
</div>
</body>
</html>
