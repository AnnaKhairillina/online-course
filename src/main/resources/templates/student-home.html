<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Студент</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="page">
    <header th:replace="~{fragments :: topbar('Кабинет студента')}"></header>

    <div class="card stats-grid">
        <div class="stat-card">
            <p class="muted">Купленных курсов</p>
            <h3 th:text="${data.courses.size()}"></h3>
        </div>
        <div class="stat-card">
            <p class="muted">Средний прогресс</p>
            <h3 th:text="${data.averageProgress + '%'}"></h3>
        </div>
        <div class="stat-card">
            <p class="muted">Сумма оплат</p>
            <h3 th:text="${data.totalPaid}"></h3>
        </div>
    </div>

    <div class="card actions-row">
        <a class="link-btn" th:href="@{/student/courses}">Список купленных курсов</a>
        <a class="link-btn" th:href="@{/student/progress}">Прогресс по курсам</a>
    </div>
</div>
</body>
</html>
